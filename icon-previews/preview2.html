<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Baby Data — B+Bars Variations</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1e1e30;
  min-height: 100vh;
  display: flex;
  flex-wrap: wrap;
  gap: 0;
  padding: 48px 24px;
  justify-content: center;
  align-items: flex-start;
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
}
.slot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 28px 20px;
}
.num  { font-size: 10px; font-weight: 700; color: rgba(185,174,234,0.45); letter-spacing: 2.5px; text-transform: uppercase; }
.name { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.65); }
.desc { font-size: 11px; color: rgba(255,255,255,0.35); text-align: center; max-width: 130px; line-height: 1.5; }
</style>
</head>
<body>

<!-- ═══ A: App's own gradient — soft lavender to sky ═══ -->
<div class="slot">
  <div class="num">A</div>
  <svg width="170" height="170" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="gA" cx="30%" cy="45%" r="75%">
        <stop offset="0%"   stop-color="#DDD7F5"/>
        <stop offset="60%"  stop-color="#D2C9EF"/>
        <stop offset="100%" stop-color="#C8DFF5"/>
      </radialGradient>
      <filter id="shadowA">
        <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#8B7FCC" flood-opacity="0.25"/>
      </filter>
      <clipPath id="cA"><rect width="200" height="200" rx="46"/></clipPath>
    </defs>
    <g clip-path="url(#cA)">
      <rect width="200" height="200" fill="url(#gA)"/>
      <!-- Soft inner glow at top-left -->
      <circle cx="35" cy="40" r="80" fill="white" opacity="0.18"/>
      <!-- B -->
      <text x="22" y="152"
            font-family="-apple-system,'Helvetica Neue',Arial,sans-serif"
            font-weight="900" font-size="138" fill="#6B5FA7" opacity="0.9"
            filter="url(#shadowA)">B</text>
      <!-- Bars — app tile colours -->
      <rect x="114" y="132" width="17" height="26" rx="6" fill="#FFD66B" opacity="0.92"/>
      <rect x="135" y="112" width="17" height="46" rx="6" fill="#AFA3E8" opacity="0.85"/>
      <rect x="156" y="96"  width="17" height="62" rx="6" fill="#7EC6FF" opacity="0.88"/>
      <!-- Baseline -->
      <line x1="112" y1="160" x2="175" y2="160" stroke="#6B5FA7" stroke-width="2" opacity="0.2"/>
    </g>
  </svg>
  <div class="name">Soft Pastel</div>
  <div class="desc">App's own gradient, purple B</div>
</div>

<!-- ═══ B: Bubbly purple — mid-tone app purple ═══ -->
<div class="slot">
  <div class="num">B</div>
  <svg width="170" height="170" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="gB" x1="0" y1="0" x2="0.6" y2="1">
        <stop offset="0%"   stop-color="#B9AEEA"/>
        <stop offset="100%" stop-color="#90C8E8"/>
      </linearGradient>
      <filter id="shadowB">
        <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4A3E8C" flood-opacity="0.22"/>
      </filter>
      <clipPath id="cB"><rect width="200" height="200" rx="46"/></clipPath>
    </defs>
    <g clip-path="url(#cB)">
      <rect width="200" height="200" fill="url(#gB)"/>
      <!-- Soft highlight blob -->
      <ellipse cx="60" cy="55" rx="90" ry="65" fill="white" opacity="0.2"/>
      <!-- B -->
      <text x="20" y="152"
            font-family="-apple-system,'Helvetica Neue',Arial,sans-serif"
            font-weight="900" font-size="138" fill="white"
            filter="url(#shadowB)">B</text>
      <!-- Bars — with soft glow rects behind -->
      <rect x="112" y="130" width="19" height="30" rx="7" fill="#FFD66B" opacity="0.3"/>
      <rect x="133" y="108" width="19" height="52" rx="7" fill="white" opacity="0.15"/>
      <rect x="154" y="92"  width="19" height="68" rx="7" fill="#BFDDF3" opacity="0.25"/>
      <!-- Foreground bars -->
      <rect x="112" y="130" width="19" height="30" rx="7" fill="#FFD66B"/>
      <rect x="133" y="108" width="19" height="52" rx="7" fill="white" opacity="0.85"/>
      <rect x="154" y="92"  width="19" height="68" rx="7" fill="#BFDDF3"/>
    </g>
  </svg>
  <div class="name">Mid Purple</div>
  <div class="desc">App's --ui-purple as background</div>
</div>

<!-- ═══ C: White card — ultra clean but warm ═══ -->
<div class="slot">
  <div class="num">C</div>
  <svg width="170" height="170" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="gC" cx="25%" cy="30%" r="80%">
        <stop offset="0%"   stop-color="#F5F2FF"/>
        <stop offset="100%" stop-color="#EAF3FC"/>
      </radialGradient>
      <filter id="shadowC">
        <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#9B8FD4" flood-opacity="0.2"/>
      </filter>
      <clipPath id="cC"><rect width="200" height="200" rx="46"/></clipPath>
    </defs>
    <g clip-path="url(#cC)">
      <rect width="200" height="200" fill="url(#gC)"/>
      <!-- B -->
      <text x="14" y="152"
            font-family="-apple-system,'Helvetica Neue',Arial,sans-serif"
            font-weight="900" font-size="138" fill="#6B5FA7"
            filter="url(#shadowC)">B</text>
      <!-- Bars — fully opaque, app colours -->
      <rect x="112" y="132" width="19" height="28" rx="7" fill="#FFD66B"/>
      <rect x="135" y="110" width="19" height="50" rx="7" fill="#C4A5FF"/>
      <rect x="158" y="93"  width="19" height="67" rx="7" fill="#7EC6FF"/>
      <!-- Tiny dots for warmth -->
      <circle cx="170" cy="32" r="5"  fill="#FFD66B" opacity="0.5"/>
      <circle cx="158" cy="22" r="3"  fill="#C4A5FF" opacity="0.5"/>
      <circle cx="180" cy="20" r="3.5" fill="#7EC6FF" opacity="0.5"/>
    </g>
  </svg>
  <div class="name">White Card</div>
  <div class="desc">Light, airy — matches app cards</div>
</div>

<!-- ═══ D: Warm purple — slightly deeper but rounded ═══ -->
<div class="slot">
  <div class="num">D</div>
  <svg width="170" height="170" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="gD" x1="0.1" y1="0" x2="0.9" y2="1">
        <stop offset="0%"   stop-color="#9B8FD4"/>
        <stop offset="100%" stop-color="#7ABAE0"/>
      </linearGradient>
      <filter id="shadowD">
        <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#3A3070" flood-opacity="0.28"/>
      </filter>
      <clipPath id="cD"><rect width="200" height="200" rx="46"/></clipPath>
    </defs>
    <g clip-path="url(#cD)">
      <rect width="200" height="200" fill="url(#gD)"/>
      <!-- Soft light blob top-left -->
      <ellipse cx="50" cy="50" rx="100" ry="75" fill="white" opacity="0.15"/>
      <!-- B with warm shadow -->
      <text x="18" y="152"
            font-family="-apple-system,'Helvetica Neue',Arial,sans-serif"
            font-weight="900" font-size="138" fill="white" opacity="0.96"
            filter="url(#shadowD)">B</text>
      <!-- Bars — rounded, soft -->
      <rect x="112" y="132" width="19" height="28" rx="8" fill="#FFF0B3" opacity="0.95"/>
      <rect x="135" y="112" width="19" height="48" rx="8" fill="white"   opacity="0.82"/>
      <rect x="158" y="95"  width="19" height="65" rx="8" fill="#CDEEFF" opacity="0.95"/>
      <!-- Subtle sparkle dots -->
      <circle cx="46"  cy="158" r="4.5" fill="white" opacity="0.18"/>
      <circle cx="32"  cy="170" r="3"   fill="white" opacity="0.12"/>
      <circle cx="175" cy="165" r="3.5" fill="white" opacity="0.15"/>
    </g>
  </svg>
  <div class="name">Warm Purple</div>
  <div class="desc">Richer but still soft and rounded</div>
</div>

</body>
</html>
