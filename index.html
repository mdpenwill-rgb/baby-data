<script>

if ('serviceWorker' in navigator) {
window.addEventListener('load', () => {
navigator.serviceWorker.register('sw.js')
})
}

/* ---------- INITIAL DATA ---------- */

if(!localStorage.getItem("events")){
localStorage.setItem("events","[]")
}

if(!localStorage.getItem("regimes")){
localStorage.setItem("regimes","[]")
}

/* LOAD DATA */
let events = JSON.parse(localStorage.getItem("events"))
let regimes = JSON.parse(localStorage.getItem("regimes"))

let activeFilter="All"
let activeEditor=null

let quickFeedMode=null
let quickFeedMilk=null
let quickFeedSide=null
let quickFeedMinutes=null

/* repair older events */

events.forEach(e => {

/* fix missing type */

if(!e.type){

if(e.icon==="🤱") e.type="Pump"
if(e.icon==="🍼") e.type="Feed"
if(e.icon==="🧷") e.type="Nappy"
if(e.icon==="🏋️") e.type="Stretch"
if(e.icon==="💊") e.type="Medication"

}

/* fix icon */

if(!e.icon){

if(e.type==="Feed") e.icon="🍼"
if(e.type==="Pump") e.icon="🤱"
if(e.type==="Nappy") e.icon="🧷"
if(e.type==="Medication") e.icon="💊"
if(e.type==="Stretch") e.icon="🏋️"

}

/* fix background */

if(!e.bg){

if(e.type==="Feed") e.bg="feed-bg"
if(e.type==="Pump") e.bg="pump-bg"
if(e.type==="Nappy") e.bg="nappy-bg"
if(e.type==="Medication") e.bg="med-bg"
if(e.type==="Stretch") e.bg="stretch-bg"

}

/* fix feed fields */

if(e.type==="Feed"){

if(!e.mode) e.mode="Bottle"
if(!e.milk) e.milk="Milly Milk"
if(e.value===undefined) e.value=0
if(!e.unit) e.unit = e.mode==="Breast" ? "min" : "ml"

}

/* fix nappy */

if(e.type==="Nappy" && !e.detail){
e.detail="Wet"
}

/* fix pump */

if(e.type==="Pump" && e.value===undefined){
e.value=0
}

})

saveAll()

if(events.length === 0){

localStorage.setItem("events", JSON.stringify([

function editEvent(id){

const e = events.find(x => x.id === id)

/* ---- EDIT FEED ---- */

if(e.type==="Feed"){

let mode = prompt("Bottle or Breast?", e.mode)
if(mode) e.mode = mode

let milk = prompt("Milk type", e.milk)
if(milk) e.milk = milk

let value = prompt("Amount / Minutes", e.value)
if(value !== null) e.value = parseInt(value)

}

/* ---- EDIT PUMP ---- */

if(e.type==="Pump"){

let value = prompt("Pump ml", e.value)
if(value !== null) e.value = parseInt(value)

}

/* ---- EDIT NAPPY ---- */

if(e.type==="Nappy"){

let detail = prompt("Wet / Dirty / Both", e.detail)
if(detail) e.detail = detail

}

/* ---- EDIT TIME ---- */

let newTime = prompt(
"Edit time (HH:MM)",
new Date(e.time).toTimeString().slice(0,5)
)

if(newTime){

const base = new Date(e.time)
const [h,m] = newTime.split(":")

base.setHours(parseInt(h))
base.setMinutes(parseInt(m))

e.time = base.toISOString()

}

saveAll()
renderAll()

}

function renderRegimeButtons(){

regimeButtons.innerHTML=""

const now = new Date()

regimes.forEach(r=>{

const last = events.find(e =>
e.type === r.type &&
(r.type !== "Medication" || e.name === r.name)
)

if(!last) return

const next = new Date(new Date(last.time).getTime() + r.interval*3600000)

const diff = next - now

let text=""
let css="regime-line"

let icon=""

if(r.type==="Feed") icon="🍼"
if(r.type==="Medication") icon="💊"
if(r.type==="Stretch") icon="🏋️"

if(diff <= 0){

text = `${icon} ${r.name} DUE`
css += " regime-DUE"

}
else{

const mins = Math.floor(diff/60000)
const h = Math.floor(mins/60)
const m = mins % 60

text = `${icon} ${r.name} due in ${h}h ${m}m`

if(mins < 30){
css += " regime-soon"
}

}

regimeButtons.innerHTML += `
<div class="${css}">
${text}
</div>
`

})

}

function renderEntries(){

entries.innerHTML=""

events.sort((a,b)=> new Date(b.time) - new Date(a.time))

let lastDayKey=""
let lastFeedTime=null

let pumpTotals = {}

if(activeFilter==="Pump"){

const pumpEvents = events.filter(e => (e.type||"").toLowerCase()==="pump")

pumpEvents.forEach(e=>{

const d = new Date(e.time)
const key = d.toDateString()

if(!pumpTotals[key]) pumpTotals[key]=0

pumpTotals[key] += (parseInt(e.value) || 0)

})

}

let nappyTotals = {}

if(activeFilter==="Nappy"){

const nappyEvents = events.filter(e => (e.type||"").toLowerCase()==="nappy")

nappyEvents.forEach(e=>{

const d = new Date(e.time)
const key = d.toDateString()

if(!nappyTotals[key]) nappyTotals[key]=0

nappyTotals[key] += 1

})

}

events.forEach(e=>{

/* show feed interval */

if(activeFilter==="Feed" && e.type==="Feed"){

const currentFeedTime = new Date(e.time)

if(lastFeedTime){

const diff = lastFeedTime - currentFeedTime

/* ignore cluster feeds under 30 minutes */

if(diff >= 1800000){

const mins = Math.floor(diff/60000)
const h = Math.floor(mins/60)
const m = mins % 60

entries.innerHTML += `
<div style="text-align:center;font-weight:600;color:#6B5FA7;margin:10px 0;">
${h}h ${m}m
</div>
`

}

}

lastFeedTime = currentFeedTime

}

const date=new Date(e.time)

const today=new Date()
const yesterday=new Date()
yesterday.setDate(today.getDate()-1)

let label=""

if(date.toDateString()===today.toDateString()){
label="Today"
}
else if(date.toDateString()===yesterday.toDateString()){
label="Yesterday"
}
else{
label=date.toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long'})
}

const dayKey = date.toDateString()

if(dayKey!==lastDayKey){

let headerText = label

if(activeFilter==="Pump" && pumpTotals[dayKey]){
headerText += ` — ${pumpTotals[dayKey]} ml`
}

if(activeFilter==="Nappy" && nappyTotals[dayKey]){
headerText += ` — ${nappyTotals[dayKey]} nappies`
}

entries.innerHTML+=`<div class="section-header">${headerText}</div>`

lastDayKey = dayKey

}

/* FILTER AFTER HEADER */

if(activeFilter!=="All" && (e.type||"").toLowerCase() !== activeFilter.toLowerCase()) return

let details=""

if(e.type==="Feed"){

const mode = e.mode || "Bottle"
const milk = e.milk || "Milly Milk"

details=`<span onclick="chooseMode(${e.id}, this)">${mode}</span> • 
<span onclick="chooseMilkType(${e.id}, this)">${milk}</span>`

if(e.mode==="Breast"){
details+=` • <span onclick="editBreastTime(${e.id}, this)">${e.value} min</span>`
}
else{
details+=` • <span onclick="editValue(${e.id}, this)">${e.value ?? ""} ${e.unit ?? ""}</span>`}

}

if(e.type==="Pump"){
details=`<span onclick="choosePump(${e.id}, this)">${e.value ?? ""} ml</span>`}
if(e.type==="Nappy"){
const detail = e.detail || "Wet"
details=`<span onclick="chooseNappy(${e.id}, this)">${detail}</span>`
}
if(e.type==="Stretch") details="Exercise"
if(e.type==="Medication"){
const name = e.name || "Medication"
const val = e.value ?? ""
details=`${name} ${val} ml`
}
entries.innerHTML+=`

<div class="card" id="event-${e.id}">

<div class="row-space">

<div class="row">

<div class="icon-box ${e.bg}">${e.icon}</div>

<div>

<div class="row-space">

<div class="title">
${e.type}
</div>

<div class="time">
<span onclick="editDate(${e.id}, this)">
${new Date(e.time).toLocaleDateString([], {month:'short', day:'numeric'})}
</span>
 • 
<span onclick="editTime(${e.id}, this)">
${new Date(e.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}
</span>
</div>

</div>

<div class="sub">${details}</div>

</div>

</div>

<div>

<button class="small" onclick="deleteEvent(${e.id})">🗑</button>

</div>

</div>

</div>

`
})

}

function repairEvents(){

events.forEach(e => {

if(!e.type){
if(e.icon==="🤱") e.type="Pump"
if(e.icon==="🍼") e.type="Feed"
if(e.icon==="🧷") e.type="Nappy"
if(e.icon==="🏋️") e.type="Stretch"
if(e.icon==="💊") e.type="Medication"
}

if(!e.icon){
if(e.type==="Feed") e.icon="🍼"
if(e.type==="Pump") e.icon="🤱"
if(e.type==="Nappy") e.icon="🧷"
if(e.type==="Medication") e.icon="💊"
if(e.type==="Stretch") e.icon="🏋️"
}

if(!e.bg){
if(e.type==="Feed") e.bg="feed-bg"
if(e.type==="Pump") e.bg="pump-bg"
if(e.type==="Nappy") e.bg="nappy-bg"
if(e.type==="Medication") e.bg="med-bg"
if(e.type==="Stretch") e.bg="stretch-bg"
}

if(e.type==="Nappy" && !e.detail){
e.detail="Wet"
}

if(e.type==="Pump" && e.value===undefined){
e.value=0
}

if(e.type==="Feed"){
if(!e.mode) e.mode="Bottle"
if(!e.milk) e.milk="Milly Milk"
if(!e.unit) e.unit = e.mode==="Breast" ? "min" : "ml"
}

})

}

function editDate(id, el){

const e = events.find(x => x.id === id)
const current = new Date(e.time)

const yyyy = current.getFullYear()
const mm = String(current.getMonth()+1).padStart(2,'0')
const dd = String(current.getDate()).padStart(2,'0')

el.innerHTML = `<input type="date" value="${yyyy}-${mm}-${dd}">`

const input = el.querySelector("input")
input.focus()

input.onblur = () => {

if(!input.value){
renderSingleEvent(id)
return
}

const [y,m,d] = input.value.split("-")

current.setFullYear(parseInt(y))
current.setMonth(parseInt(m)-1)
current.setDate(parseInt(d))

e.time = current.toISOString()

saveAll()
renderSingleEvent(id)
updateBell()

}

}

function editTime(id, el){

const e = events.find(x => x.id === id)

const d = new Date(e.time)

const hh = String(d.getHours()).padStart(2,'0')
const mm = String(d.getMinutes()).padStart(2,'0')

const original = `${hh}:${mm}`

el.innerHTML = `<input type="time" value="${original}" style="font-size:14px;">`

const input = el.querySelector("input")
input.focus()

input.onblur = () => {

if(!input.value) {
renderSingleEvent(id)
return
}

/* do nothing if unchanged */

if(input.value === original){
renderSingleEvent(id)
return
}

const [h,m] = input.value.split(":")

const updated = new Date(e.time)

updated.setHours(parseInt(h))
updated.setMinutes(parseInt(m))

e.time = updated.toISOString()

saveAll()
renderSingleEvent(id)
updateBell()
}

}

function exportCSV(){

let rows = [
["id","type","mode","milk","value","unit","detail","name","time"]
]

repairEvents()

events.forEach(e => {

rows.push([
e.id || "",
e.type || "",
e.mode || "",
e.milk || "",
e.value || "",
e.unit || "",
e.detail || "",
e.name || "",
e.time || ""
])

})

let csv = rows.map(r => r.join(",")).join("\n")

let blob = new Blob([csv], {type:"text/csv"})
let url = URL.createObjectURL(blob)

let a = document.createElement("a")
a.href = url
a.download = "baby-data.csv"
a.click()

URL.revokeObjectURL(url)

}


function handleCSVImport(event){
const file = event.target.files[0]

if(!file) return

const reader = new FileReader()

reader.onload = function(e){

const text = e.target.result
const rows = text.split("\n").slice(1)

let imported = 0

rows.forEach(r => {

const cols = r.split(",")

if(cols.length < 9) return

const id = parseInt(cols[0])

/* skip duplicates */
if(events.some(ev => ev.id === id)) return

const newEvent = {

id: id,
type: cols[1] || "",

mode: cols[2] || "",
milk: cols[3] || "",
value: cols[4] ? parseInt(cols[4]) : 0,
unit: cols[5] || "",
detail: cols[6] || "",
name: cols[7] || "",
time: cols[8] || "",

icon:
cols[1] === "Feed" ? "🍼" :
cols[1] === "Pump" ? "🤱" :
cols[1] === "Nappy" ? "🧷" :
cols[1] === "Medication" ? "💊" :
cols[1] === "Stretch" ? "🏋️" : "",

bg:
cols[1] === "Feed" ? "feed-bg" :
cols[1] === "Pump" ? "pump-bg" :
cols[1] === "Nappy" ? "nappy-bg" :
cols[1] === "Medication" ? "med-bg" :
cols[1] === "Stretch" ? "stretch-bg" : ""

}

events.push(newEvent)
imported++

})

repairEvents()

saveAll()
renderAll()

if(imported === 0){
alert("No new events imported")
}else{
alert(imported + " new events imported")
}

}

reader.readAsText(file)

}

function renderRegimePanel(){

const panel = document.getElementById("regimePanel")

const now = new Date()

let dueNow = []
let upcoming = []

regimes.forEach(r=>{

const last = events
.filter(e =>
e.type === r.type &&
(r.type !== "Medication" || e.name === r.name)
)
.sort((a,b)=> new Date(b.time) - new Date(a.time))[0]

if(!last){
dueNow.push(r)
return
}

const next = new Date(new Date(last.time).getTime() + r.interval*3600000)

const diff = next - now

if(diff <= 0){
dueNow.push(r)
}
else{
upcoming.push({r,diff})
}

})

let html=""

/* DUE NOW */

if(dueNow.length){

html+=`<div style="color:#E54848;font-weight:700;margin-bottom:8px">Due now</div>`

dueNow.forEach(r=>{
html+=`<div>${r.name}</div>`
})

html+=`<hr style="margin:10px 0;border:none;border-top:1px solid #eee">`

}

/* UPCOMING */

upcoming.forEach(o=>{

const mins = Math.floor(o.diff/60000)
const h = Math.floor(mins/60)
const m = mins % 60

html+=`<div>${o.r.name} — ${h}h ${m}m</div>`

})

if(html===""){
html = `<div>No regimes saved</div>`
}

panel.innerHTML = html

}

function updateBell(){

const bell = document.querySelector(".bell-btn")

if(!bell) return

const now = new Date()

let state = "normal"

regimes.forEach(r=>{

const last = events
.filter(e =>
e.type === r.type &&
(r.type !== "Medication" || e.name === r.name)
)
.sort((a,b)=> new Date(b.time) - new Date(a.time))[0]

if(!last){
state = "due"
return
}

const next = new Date(new Date(last.time).getTime() + r.interval*3600000)

const diff = next - now

if(diff <= 0){
state = "due"
}
else if(diff < 1800000 && state !== "due"){
state = "soon"
}

})

bell.classList.remove("bell-normal","bell-soon","bell-due")

bell.classList.add(
state==="due" ? "bell-due" :
state==="soon" ? "bell-soon" :
"bell-normal"
)

}
