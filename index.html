</div>

function repairEvents(){

events.forEach(e => {

if(!e.type){
if(e.icon==="🤱") e.type="Pump"
if(e.icon==="🍼") e.type="Feed"
if(e.icon==="🧷") e.type="Nappy"
if(e.icon==="👄") e.type="Stretch"
if(e.icon==="💊") e.type="Medication"
}

if(!e.icon){
if(e.type==="Feed") e.icon="🍼"
if(e.type==="Pump") e.icon="🤱"
if(e.type==="Nappy") e.icon="🧷"
if(e.type==="Medication") e.icon="💊"
if(e.type==="Stretch") e.icon="👄"
}

if(!e.bg){
if(e.type==="Feed") e.bg="feed-bg"
if(e.type==="Pump") e.bg="pump-bg"
if(e.type==="Nappy") e.bg="nappy-bg"
if(e.type==="Medication") e.bg="med-bg"
if(e.type==="Stretch") e.bg="stretch-bg"
}

if(e.type==="Nappy" && !e.detail){
e.detail="Wet"
}

if(e.type==="Pump" && e.value===undefined){
e.value=0
}

if(e.type==="Feed"){
if(!e.mode) e.mode="Bottle"
if(!e.milk) e.milk="Milly Milk"
if(!e.unit) e.unit = e.mode==="Breast" ? "min" : "ml"
}

})

}

function editDate(id, el){

const e = events.find(x => x.id === id)
const current = new Date(e.time)

const yyyy = current.getFullYear()
const mm = String(current.getMonth()+1).padStart(2,'0')
const dd = String(current.getDate()).padStart(2,'0')

el.innerHTML = `<input type="date" value="${yyyy}-${mm}-${dd}">`

const input = el.querySelector("input")
input.focus()

input.onblur = () => {

if(!input.value){
renderAll()
return
}

const [y,m,d] = input.value.split("-")

current.setFullYear(parseInt(y))
current.setMonth(parseInt(m)-1)
current.setDate(parseInt(d))

e.time = current.toISOString()

saveAll()
renderAll()

}

}

function editTime(id, el){

const e = events.find(x => x.id === id)

const d = new Date(e.time)

const hh = String(d.getHours()).padStart(2,'0')
const mm = String(d.getMinutes()).padStart(2,'0')

const original = `${hh}:${mm}`

el.innerHTML = `<input type="time" value="${original}" style="font-size:14px;">`

const input = el.querySelector("input")
input.focus()

input.onblur = () => {

if(!input.value) {
renderAll()
return
}

/* do nothing if unchanged */

if(input.value === original){
renderAll()
return
}

const [h,m] = input.value.split(":")

const updated = new Date(e.time)

updated.setHours(parseInt(h))
updated.setMinutes(parseInt(m))

e.time = updated.toISOString()

saveAll()
renderAll()

}

}

function exportCSV(){

let rows = [
["id","type","mode","milk","value","unit","detail","name","time"]
]

repairEvents()

events.forEach(e => {

rows.push([
e.id || "",
e.type || "",
e.mode || "",
e.milk || "",
e.value || "",
e.unit || "",
e.detail || "",
e.name || "",
e.time || ""
])

})

let csv = rows.map(r => r.join(",")).join("\n")

let blob = new Blob([csv], {type:"text/csv"})
let url = URL.createObjectURL(blob)

let a = document.createElement("a")
a.href = url
a.download = "baby-data.csv"
a.click()

URL.revokeObjectURL(url)

}

function importCSV(){

document.getElementById("csvFile").addEventListener("change", function(){

const file = this.files[0]
if(!file) return

const reader = new FileReader()

reader.onload = function(e){

const text = e.target.result
const rows = text.split("\n").slice(1)

let imported = 0

rows.forEach(r => {

const cols = r.split(",")

if(cols.length < 9) return

const id = parseInt(cols[0])

/* skip duplicates */
if(events.some(ev => ev.id === id)) return

const newEvent = {

id: id,
type: cols[1] || "",

mode: cols[2] || "",
milk: cols[3] || "",
value: cols[4] ? parseInt(cols[4]) : 0,
unit: cols[5] || "",
detail: cols[6] || "",
name: cols[7] || "",
time: cols[8] || "",

icon:
cols[1] === "Feed" ? "🍼" :
cols[1] === "Pump" ? "🤱" :
cols[1] === "Nappy" ? "🧷" :
cols[1] === "Medication" ? "💊" :
cols[1] === "Stretch" ? "👄" : "",

bg:
cols[1] === "Feed" ? "feed-bg" :
cols[1] === "Pump" ? "pump-bg" :
cols[1] === "Nappy" ? "nappy-bg" :
cols[1] === "Medication" ? "med-bg" :
cols[1] === "Stretch" ? "stretch-bg" : ""

}

events.push(newEvent)
imported++

})

repairEvents()

saveAll()
renderAll()

if(imported === 0){
alert("No new events imported")
}else{
alert(imported + " new events imported")
}

}

reader.readAsText(file)

})

Formula
</button>

</div>
`

}

if(mode==="Breast"){

panel.innerHTML=`
<div class="quick-option-grid">

<button class="quick-option feed" onclick="feedSideSelect('Left')">
⬅️
Left
</button>

<button class="quick-option feed" onclick="feedSideSelect('Right')">
➡️
Right
</button>

<button class="quick-option feed" onclick="feedSideSelect('Both')">
🔄
Both
</button>

</div>
`

}

}

function feedMilkSelect(milk){

quickFeedMilk = milk

const panel = document.getElementById("quickPanel")

panel.innerHTML=`
<div class="quick-option-grid">

<button class="quick-option feed" onclick="finishBottleFeed(10)">10 ml</button>
<button class="quick-option feed" onclick="finishBottleFeed(20)">20 ml</button>
<button class="quick-option feed" onclick="finishBottleFeed(30)">30 ml</button>
<button class="quick-option feed" onclick="finishBottleFeed(40)">40 ml</button>

</div>
`

}

function feedSideSelect(side){

quickFeedSide = side

const panel = document.getElementById("quickPanel")

panel.innerHTML=`
<div class="quick-option-grid">

<button class="quick-option feed" onclick="finishBreastFeed(5)">5 min</button>
<button class="quick-option feed" onclick="finishBreastFeed(10)">10 min</button>
<button class="quick-option feed" onclick="finishBreastFeed(15)">15 min</button>
<button class="quick-option feed" onclick="finishBreastFeed(20)">20 min</button>
<button class="quick-option feed" onclick="finishBreastFeed(25)">25 min</button>
<button class="quick-option feed" onclick="finishBreastFeed(30)">30 min</button>

</div>
`

}

function finishBottleFeed(amount){

events.unshift({
id:Date.now(),
type:"Feed",
mode:"Bottle",
milk:quickFeedMilk,
value:amount,
unit:"ml",
icon:"🍼",
bg:"feed-bg",
time:new Date().toISOString()
})

saveAll()
renderAll()

document.getElementById("quickPanel").innerHTML=""

scrollTop()

}

function finishBreastFeed(minutes){

events.unshift({
id:Date.now(),
type:"Feed",
mode:"Breast",
milk:"Milly Milk",
side:quickFeedSide,
value:minutes,
unit:"min",
icon:"🍼",
bg:"feed-bg",
time:new Date().toISOString()
})

saveAll()
renderAll()

document.getElementById("quickPanel").innerHTML=""

scrollTop()

}

function finishPump(amount){

events.unshift({
id:Date.now(),
type:"Pump",
value:amount,
unit:"ml",
icon:"🤱",
bg:"pump-bg",
time:new Date().toISOString()
})

saveAll()
renderAll()

/* set default filter button */
document.querySelector(".filter-btn").classList.add("filter-active")

document.getElementById("quickPanel").innerHTML=""

scrollTop()

}

</script>

<div id="toast"></div>

</body>
</html>
